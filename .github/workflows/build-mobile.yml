name: Build Mobile Apps (Capacitor)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App
        run: npm run build:web

      - name: Sync Capacitor Android
        working-directory: apps/mobile
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK with Gradle
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartyHitz-Android-APK
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App
        run: npm run build:web

      - name: Sync Capacitor iOS
        working-directory: apps/mobile
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build iOS App without Code Signing
        run: |
          cd apps/mobile/ios/App
          pod install || true
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     CONFIGURATION_BUILD_DIR=build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Package to IPA
        run: |
          cd apps/mobile/ios/App
          mkdir -p Payload
          mv build/App.app Payload/
          zip -qr PartyHitz.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartyHitz-iOS-IPA
          path: apps/mobile/ios/App/PartyHitz.ipa
